name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fix file structure
        run: |
          mkdir -p public
          cp -f icon-192.png public/ 2>/dev/null || true
          cp -f icon-512.png public/ 2>/dev/null || true
      - name: Fix iOS text replacements and rebrand
        run: |
          python3 << 'PYEOF'
          with open('src/App.jsx', 'r', encoding='utf-8') as f:
              content = f.read()
          replacements = {
              '\u201c': '"', '\u201d': '"',
              '\u2018': "'", '\u2019': "'",
              '\u2026': '...',
              '\u2013': '-', '\u2014': '-', '\u2015': '-',
          }
          for old, new in replacements.items():
              content = content.replace(old, new)
          content = '\n'.join([l for l in content.split('\n') if '```' not in l])
          content = content.replace('TASK QUEUE', 'MYTASK')
          with open('src/App.jsx', 'w', encoding='utf-8') as f:
              f.write(content)
          PYEOF
      - run: npm install
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
